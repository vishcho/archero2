<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="img/fire.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>弓箭傳說2 明星賽紀錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-yellow-400 mb-2">⚔️ 弓箭傳說2 明星賽紀錄</h1>
    <p class="text-slate-400 mb-8">歷屆資格賽、淘汰賽與總決賽結果</p>
    <div id="seasons-list" class="space-y-4"></div>
  </div>

  <script src="js/common.js"></script>
  <script>
    async function load() {
      const seasons = await fetchAllSeasons();

      const container = document.getElementById('seasons-list');
      seasons.reverse().forEach(s => {
        const card = document.createElement('a');
        card.href = `season.html?id=${s.id}`;
        card.className = 'block bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl p-5 transition';
        card.innerHTML = `
          <div class="flex items-center justify-between">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-lg font-bold text-white">${s.date}</span>
                ${statusBadge(s.status)}
              </div>
              <div class="text-sm text-slate-400">主題：${s.theme}</div>
              ${s.champion
                ? `<div class="text-sm text-yellow-400 mt-1">🏆 冠軍：${s.champion}</div>`
                : '<div class="text-sm text-slate-500 mt-1">總決賽待定</div>'}
            </div>
            <span class="text-slate-500 text-xl">›</span>
          </div>
        `;
        container.appendChild(card);
      });
    }
    load();
  </script>
</body>
</html>
