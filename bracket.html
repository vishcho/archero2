    function renderBracket(g) {
      const p = g.players;

      // Layout constants
      const PW = 190, PH = 52, GAP = 8, VGAP = 56;
      const svgW = 920;
      const LX = 0, RX = svgW - PW;

      // Y top of each card
      const Y = [
        20,
        20 + PH + GAP,
        20 + 2*(PH + GAP) + VGAP,
        20 + 3*(PH + GAP) + VGAP,
      ];
      // Center Y of each card
      const CY = Y.map(y => y + PH / 2);

      const midYtop = (CY[0] + CY[1]) / 2;   // where top semi lines meet
      const midYbot = (CY[2] + CY[3]) / 2;   // where bot semi lines meet
      const semiY   = (midYtop + midYbot) / 2; // champion Y

      const svgH = Y[3] + PH + 30;

      // X positions for connector arms
      const armL = LX + PW + 18;
      const armR = RX - 18;
      const midX = svgW / 2;       // center X

      const lc = '#475569';         // line color
      const lw = 2;

      function playerFO(pl, x, y) {
        const bs = BADGE[pl.prev] || BADGE['未入選'];
        return `
          <foreignObject x="${x}" y="${y}" width="${PW}" height="${PH}">
            <div xmlns="http://www.w3.org/1999/xhtml"
                 style="background:#1e293b;border:1px solid #334155;border-radius:6px;
                        padding:5px 10px;height:${PH}px;box-sizing:border-box;">
              <div style="font-size:12px;font-weight:600;color:#f1f5f9;
                          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                #${pl.rank} ${pl.name}
                <span style="${bs};font-size:9px;padding:1px 5px;border-radius:999px;
                              font-weight:600;margin-left:3px;">${pl.prev}</span>
              </div>
              <div style="font-size:11px;color:#64748b;font-family:monospace;
                          display:flex;gap:8px;margin-top:3px;">
                <span>${pl.power}</span>
                <span style="color:#eab308;">${pl.time}</span>
              </div>
            </div>
          </foreignObject>`;
      }

      function lines(pairs) {
        return pairs.map(([x1,y1,x2,y2]) =>
          `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
                 stroke="${lc}" stroke-width="${lw}"/>`
        ).join('');
      }

      function semiLabel(x, y, label) {
        return `
          <circle cx="${x}" cy="${y}" r="4" fill="${lc}"/>
          <text x="${x}" y="${y - 8}" text-anchor="middle"
                fill="#64748b" font-size="10">${label}</text>`;
      }

      const champW = 130, champH = 40;
      const champX = midX - champW / 2;
      const champY = semiY - champH / 2;

      return `
      <svg viewBox="0 0 ${svgW} ${svgH}" width="100%"
           style="max-width:${svgW}px;display:block;"
           xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml">

        <!-- ── LEFT players ── -->
        ${playerFO(p[0], LX, Y[0])}
        ${playerFO(p[1], LX, Y[1])}
        ${playerFO(p[2], LX, Y[2])}
        ${playerFO(p[3], LX, Y[3])}

        <!-- ── RIGHT players ── -->
        ${playerFO(p[4], RX, Y[0])}
        ${playerFO(p[5], RX, Y[1])}
        ${playerFO(p[6], RX, Y[2])}
        ${playerFO(p[7], RX, Y[3])}

        <!-- ── LEFT top pair arm ── -->
        ${lines([
          [LX+PW, CY[0], armL, CY[0]],
          [LX+PW, CY[1], armL, CY[1]],
          [armL, CY[0], armL, CY[1]],
          [armL, midYtop, midX, midYtop],
        ])}

        <!-- ── LEFT bottom pair arm ── -->
        ${lines([
          [LX+PW, CY[2], armL, CY[2]],
          [LX+PW, CY[3], armL, CY[3]],
          [armL, CY[2], armL, CY[3]],
          [armL, midYbot, midX, midYbot],
        ])}

        <!-- ── RIGHT top pair arm ── -->
        ${lines([
          [RX, CY[0], armR, CY[0]],
          [RX, CY[1], armR, CY[1]],
          [armR, CY[0], armR, CY[1]],
          [armR, midYtop, midX, midYtop],
        ])}

        <!-- ── RIGHT bottom pair arm ── -->
        ${lines([
          [RX, CY[2], armR, CY[2]],
          [RX, CY[3], armR, CY[3]],
          [armR, CY[2], armR, CY[3]],
          [armR, midYbot, midX, midYbot],
        ])}

        <!-- ── Semi vertical spines to champion ── -->
        ${lines([
          [midX, midYtop, midX, champY],
          [midX, champY + champH, midX, midYbot],
        ])}

        <!-- ── Semi node dots ── -->
        ${semiLabel(midX, midYtop, '準決賽')}
        ${semiLabel(midX, midYbot, '準決賽')}

        <!-- ── Champion box ── -->
        <rect x="${champX}" y="${champY}" width="${champW}" height="${champH}"
              rx="8" fill="#1c2a0a" stroke="#eab308" stroke-width="2"/>
        <text x="${midX}" y="${champY + 16}" text-anchor="middle"
              fill="#eab308" font-size="11" font-weight="bold">🏆 決賽</text>
        <text x="${midX}" y="${champY + 31}" text-anchor="middle"
              fill="#94a3b8" font-size="11">待定</text>
      </svg>`;
    }

    // Tabs
    const tabsEl = document.getElementById('tabs');
    const wrapEl = document.getElementById('bracket-wrap');

    groups.forEach((g, i) => {
      const btn = document.createElement('button');
      btn.textContent = `第 ${g.id} 組`;
      btn.className = `px-4 py-2 rounded-lg text-sm font-semibold transition
        ${i === 0 ? 'bg-yellow-500 text-black' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`;
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tabs button').forEach(b =>
          b.className = 'px-4 py-2 rounded-lg text-sm font-semibold transition bg-slate-700 text-slate-300 hover:bg-slate-600');
        btn.className = 'px-4 py-2 rounded-lg text-sm font-semibold transition bg-yellow-500 text-black';
        wrapEl.innerHTML = renderBracket(g);
      });
      tabsEl.appendChild(btn);
    });

    wrapEl.innerHTML = renderBracket(groups[0]);
