<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="img/fire.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>淘汰賽對陣 — 弓箭傳說2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-full mx-auto">
    <div class="mb-4 flex items-center gap-3 flex-wrap">
      <a id="back-link" href="index.html" class="text-slate-500 hover:text-white text-sm">← 返回</a>
      <h1 id="title" class="text-xl font-bold text-yellow-400">淘汰賽對陣</h1>
    </div>
    <div id="tabs" class="flex gap-2 mb-6 flex-wrap"></div>
    <div id="bracket-wrap" class="overflow-x-auto"></div>
  </div>

  <script src="js/common.js"></script>
  <script>
    // groups[].players 依對陣位置排序（見 README「資料格式」）：
    //   players[0..3] = 左側（上→下）、players[4..7] = 右側（上→下）
    //   準決賽（上半）：[0]v[1] 勝者 vs [4]v[5] 勝者
    //   準決賽（下半）：[2]v[3] 勝者 vs [6]v[7] 勝者
    //   組決賽：上半勝者 vs 下半勝者
    function renderBracket(g) {
      const p = g.players;

      // Layout constants
      const PW = 190, PH = 52, GAP = 8, VGAP = 56;
      const svgW = 920;
      const LX = 0, RX = svgW - PW;

      // Y top of each card
      const Y = [
        20,
        20 + PH + GAP,
        20 + 2*(PH + GAP) + VGAP,
        20 + 3*(PH + GAP) + VGAP,
      ];
      // Center Y of each card
      const CY = Y.map(y => y + PH / 2);

      const midYtop = (CY[0] + CY[1]) / 2;   // where top semi lines meet
      const midYbot = (CY[2] + CY[3]) / 2;   // where bot semi lines meet
      const semiY   = (midYtop + midYbot) / 2; // champion Y

      const svgH = Y[3] + PH + 30;

      // X positions for connector arms
      const armL = LX + PW + 18;
      const armR = RX - 18;
      const midX = svgW / 2;       // center X

      const lc = '#475569';         // line color
      const lw = 2;

      function playerFO(pl, x, y) {
        const badgeVal = pl.prev_best || pl.prev_progress || '';
        const bs = PREV_BADGE_STYLE[badgeVal] || 'background:#374151;color:#9ca3af';
        const rank = pl.qualifier_rank != null ? `#${pl.qualifier_rank} ` : '';
        return `
          <foreignObject x="${x}" y="${y}" width="${PW}" height="${PH}">
            <div xmlns="http://www.w3.org/1999/xhtml"
                 style="background:#1e293b;border:1px solid #334155;border-radius:6px;
                        padding:5px 10px;height:${PH}px;box-sizing:border-box;">
              <div style="font-size:12px;font-weight:600;color:#f1f5f9;
                          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${rank}${displayName(pl)}
                ${badgeVal ? `<span style="${bs};font-size:9px;padding:1px 5px;border-radius:999px;
                              font-weight:600;margin-left:3px;">${badgeVal}</span>` : ''}
              </div>
              <div style="font-size:11px;color:#64748b;font-family:monospace;
                          display:flex;gap:8px;margin-top:3px;">
                <span>${pl.power || '—'}</span>
                <span style="color:#eab308;">${pl.qualifier_time || '—'}</span>
              </div>
            </div>
          </foreignObject>`;
      }

      function lines(pairs) {
        return pairs.map(([x1,y1,x2,y2]) =>
          `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
                 stroke="${lc}" stroke-width="${lw}"/>`
        ).join('');
      }

      function semiLabel(x, y, label) {
        return `
          <circle cx="${x}" cy="${y}" r="4" fill="${lc}"/>
          <text x="${x}" y="${y - 8}" text-anchor="middle"
                fill="#64748b" font-size="10">${label}</text>`;
      }

      const champW = 130, champH = 40;
      const champX = midX - champW / 2;
      const champY = semiY - champH / 2;

      return `
      <svg viewBox="0 0 ${svgW} ${svgH}" width="100%"
           style="max-width:${svgW}px;display:block;"
           xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml">

        <!-- ── LEFT players ── -->
        ${playerFO(p[0], LX, Y[0])}
        ${playerFO(p[1], LX, Y[1])}
        ${playerFO(p[2], LX, Y[2])}
        ${playerFO(p[3], LX, Y[3])}

        <!-- ── RIGHT players ── -->
        ${playerFO(p[4], RX, Y[0])}
        ${playerFO(p[5], RX, Y[1])}
        ${playerFO(p[6], RX, Y[2])}
        ${playerFO(p[7], RX, Y[3])}

        <!-- ── LEFT top pair arm ── -->
        ${lines([
          [LX+PW, CY[0], armL, CY[0]],
          [LX+PW, CY[1], armL, CY[1]],
          [armL, CY[0], armL, CY[1]],
          [armL, midYtop, midX, midYtop],
        ])}

        <!-- ── LEFT bottom pair arm ── -->
        ${lines([
          [LX+PW, CY[2], armL, CY[2]],
          [LX+PW, CY[3], armL, CY[3]],
          [armL, CY[2], armL, CY[3]],
          [armL, midYbot, midX, midYbot],
        ])}

        <!-- ── RIGHT top pair arm ── -->
        ${lines([
          [RX, CY[0], armR, CY[0]],
          [RX, CY[1], armR, CY[1]],
          [armR, CY[0], armR, CY[1]],
          [armR, midYtop, midX, midYtop],
        ])}

        <!-- ── RIGHT bottom pair arm ── -->
        ${lines([
          [RX, CY[2], armR, CY[2]],
          [RX, CY[3], armR, CY[3]],
          [armR, CY[2], armR, CY[3]],
          [armR, midYbot, midX, midYbot],
        ])}

        <!-- ── Semi vertical spines to champion ── -->
        ${lines([
          [midX, midYtop, midX, champY],
          [midX, champY + champH, midX, midYbot],
        ])}

        <!-- ── Semi node dots ── -->
        ${semiLabel(midX, midYtop, '準決賽')}
        ${semiLabel(midX, midYbot, '準決賽')}

        <!-- ── Champion box ── -->
        <rect x="${champX}" y="${champY}" width="${champW}" height="${champH}"
              rx="8" fill="#1c2a0a" stroke="#eab308" stroke-width="2"/>
        <text x="${midX}" y="${champY + 16}" text-anchor="middle"
              fill="#eab308" font-size="11" font-weight="bold">🏆 組冠軍</text>
        <text x="${midX}" y="${champY + 31}" text-anchor="middle"
              fill="${g.champion ? '#f1f5f9' : '#94a3b8'}" font-size="11">${g.champion || '待定'}</text>
      </svg>`;
    }

    async function init() {
      const params = new URLSearchParams(location.search);
      const ids = await fetchSeasonIds();
      const id = params.get('id') || ids[ids.length - 1];
      const data = await fetchSeason(id);

      document.title = `${data.date} 淘汰賽對陣 — 弓箭傳說2`;
      document.getElementById('title').textContent = `${data.date} 淘汰賽對陣`;
      document.getElementById('back-link').href = `season.html?id=${id}`;

      const tabsEl = document.getElementById('tabs');
      const wrapEl = document.getElementById('bracket-wrap');

      if (!data.groups || !data.groups.length) {
        wrapEl.innerHTML = '<div class="text-slate-500 text-center py-12">尚無分組資料</div>';
        return;
      }

      data.groups.forEach((g, i) => {
        const btn = document.createElement('button');
        btn.textContent = `第 ${g.id} 組`;
        btn.className = `px-4 py-2 rounded-lg text-sm font-semibold transition
          ${i === 0 ? 'bg-yellow-500 text-black' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`;
        btn.addEventListener('click', () => {
          document.querySelectorAll('#tabs button').forEach(b =>
            b.className = 'px-4 py-2 rounded-lg text-sm font-semibold transition bg-slate-700 text-slate-300 hover:bg-slate-600');
          btn.className = 'px-4 py-2 rounded-lg text-sm font-semibold transition bg-yellow-500 text-black';
          wrapEl.innerHTML = renderBracket(g);
        });
        tabsEl.appendChild(btn);
      });

      wrapEl.innerHTML = renderBracket(data.groups[0]);
    }

    init();
  </script>
</body>
</html>
